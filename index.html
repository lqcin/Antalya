<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">

<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0f1e;
  --surface:rgba(16,24,48,0.96);
  --surface2:rgba(22,32,64,0.92);
  --border:rgba(74,158,255,0.22);
  --accent:#4a9eff;
  --accent2:#00e5b4;
  --warn:#ffb830;
  --danger:#ff4757;
  --text:#e8f0ff;
  --text2:#7a90b8;
  --radius:14px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;}
#map{position:absolute;inset:0;z-index:0;}
.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-bottom-right,
.maplibregl-ctrl-top-left,.maplibregl-ctrl-top-right{display:none!important;}
.maplibregl-canvas{outline:none;}

/* Splash */
#loading{
  position:absolute;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;transition:opacity 0.5s ease;
}
.splash-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(74,158,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(74,158,255,0.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.splash-glow{
  position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(74,158,255,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.splash-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px;}
.splash-icon{
  width:84px;height:84px;border-radius:24px;
  background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.3);
  display:flex;align-items:center;justify-content:center;margin-bottom:8px;
  animation:iconPulse 2s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{box-shadow:0 0 0 0 rgba(74,158,255,0.2);}50%{box-shadow:0 0 0 16px rgba(74,158,255,0);}}
.splash-title{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.splash-sub{font-size:12px;color:var(--text2);letter-spacing:2.5px;text-transform:uppercase;}
.splash-bar-wrap{width:200px;height:3px;background:rgba(74,158,255,0.15);border-radius:2px;overflow:hidden;margin-top:28px;}
#splash-progress{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s ease;}
#loading-status{font-size:12px;color:var(--text2);margin-top:8px;}
.splash-footer{position:absolute;bottom:max(24px,env(safe-area-inset-bottom));font-size:11px;color:rgba(122,144,184,0.35);letter-spacing:1px;}

/* Topbar */
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:100;
  padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(10,15,30,0.9) 0%,transparent 100%);
  pointer-events:none;
}
#gps-badge{
  pointer-events:all;display:flex;align-items:center;gap:7px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:7px 13px;font-size:12px;color:var(--text2);
  cursor:pointer;transition:border-color 0.2s;
}
#gps-badge.active{border-color:var(--accent2);color:var(--accent2);}
#gps-dot{width:8px;height:8px;border-radius:50%;background:var(--text2);transition:background 0.2s;}
#gps-badge.active #gps-dot{background:var(--accent2);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
#coord-txt{font-size:11px;color:rgba(122,144,184,0.7);font-variant-numeric:tabular-nums;}

/* Compass */
#compass{
  position:absolute;z-index:100;
  top:max(72px,calc(env(safe-area-inset-top)+60px));right:16px;
  width:46px;height:46px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  display:none;align-items:center;justify-content:center;cursor:pointer;
}

/* Nav HUD */
#nav-hud{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:100;pointer-events:none;
  display:none;flex-direction:column;align-items:center;gap:10px;
}
#nav-ring{
  width:88px;height:88px;border-radius:50%;
  background:rgba(10,15,30,0.88);border:2.5px solid var(--accent2);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(0,229,180,0.3);
}
#nav-arrow{font-size:44px;transition:transform 0.25s ease;}
#nav-dist{
  font-size:24px;font-weight:800;color:var(--accent2);
  font-variant-numeric:tabular-nums;
  background:rgba(10,15,30,0.88);border:1px solid rgba(0,229,180,0.3);
  border-radius:20px;padding:6px 18px;
}
#nav-name{
  font-size:12px;color:var(--text2);
  background:rgba(10,15,30,0.8);padding:4px 14px;border-radius:10px;
  max-width:220px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Obje popup */
#obj-popup{
  position:absolute;bottom:90px;left:16px;right:16px;z-index:200;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;display:none;
  animation:slideUp 0.2s ease;
}
@keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
#obj-name-txt{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;}
#obj-info-txt{font-size:12px;color:var(--text2);margin-bottom:12px;}
.obj-btns{display:flex;gap:8px;}
.obj-btn{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:transform 0.12s;}
.obj-btn:active{transform:scale(0.95);}
.obj-btn.primary{background:var(--accent);color:#fff;}
.obj-btn.ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

/* Snap badge */
#snap-badge{
  position:absolute;z-index:100;
  top:max(72px,calc(env(safe-area-inset-top)+60px));right:70px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;
  color:var(--text2);display:none;transition:all 0.2s;
}
#snap-badge.on{border-color:var(--accent2);color:var(--accent2);}

/* Ölçüm paneli */
#meas-panel{
  position:absolute;z-index:200;
  top:max(72px,calc(env(safe-area-inset-top)+60px));left:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;display:none;min-width:155px;
}
.mp-title{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:0.8px;margin-bottom:6px;}
#meas-val{font-size:22px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
#meas-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.mp-modes{display:flex;gap:6px;margin-top:10px;}
.mp-mode{flex:1;padding:6px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);}
.mp-mode.on{background:rgba(74,158,255,0.15);border-color:var(--accent);color:var(--accent);}
#meas-clr{width:100%;margin-top:6px;padding:7px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(255,71,87,0.3);background:rgba(255,71,87,0.12);color:var(--danger);}

/* Harita tipi paneli */
#mt-panel{
  position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:200;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px;
  display:none;gap:8px;
}
#mt-panel.show{display:flex;}
.mt-card{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:10px 14px;border-radius:10px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface2);
  transition:all 0.15s;min-width:66px;
}
.mt-card:active{transform:scale(0.93);}
.mt-card.on{border-color:var(--accent);background:rgba(74,158,255,0.14);}
.mt-card .ico{font-size:22px;}
.mt-card .lbl{font-size:10px;color:var(--text2);font-weight:600;}

/* Toolbar */
#toolbar{
  position:absolute;bottom:0;left:0;right:0;z-index:100;
  padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));
  display:flex;gap:6px;
  background:linear-gradient(0deg,rgba(10,15,30,0.98) 0%,transparent 100%);
}
.tbtn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:10px 6px;cursor:pointer;color:var(--text2);
  font-size:10px;font-weight:600;letter-spacing:0.3px;
  transition:all 0.15s;
}
.tbtn .ico{font-size:20px;line-height:1;}
.tbtn:active{transform:scale(0.93);}
.tbtn.on{background:rgba(74,158,255,0.14);border-color:var(--accent);color:var(--accent);}
.tbtn.on2{background:rgba(0,229,180,0.1);border-color:var(--accent2);color:var(--accent2);}

/* Toast */
#toast{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:500;background:rgba(10,15,30,0.95);border:1px solid var(--border);
  border-radius:20px;padding:10px 20px;font-size:13px;color:var(--text);
  opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;}

/* MapLibre popup */
.maplibregl-popup-content{
  background:var(--surface)!important;color:var(--text)!important;
  border:1px solid var(--border)!important;border-radius:10px!important;
  padding:10px 14px!important;box-shadow:none!important;
}
.maplibregl-popup-tip{border-top-color:var(--surface)!important;}
</style>
</head>
<body>

<!-- Splash -->
<div id="loading">
  <div class="splash-bg"></div>
  <div class="splash-glow"></div>
  <div class="splash-content">
    <div class="splash-icon">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="24" r="8" fill="#4a9eff"/>
        <path d="M26 32 Q18 42 26 48 Q34 42 26 32Z" fill="#4a9eff" opacity="0.7"/>
        <circle cx="26" cy="24" r="14" stroke="rgba(74,158,255,0.3)" stroke-width="1.5" fill="none"/>
        <circle cx="26" cy="24" r="20" stroke="rgba(74,158,255,0.15)" stroke-width="1" fill="none"/>
      </svg>
    </div>
    <div class="splash-title">Antalya Saha</div>
    <div class="splash-sub">COP31 · Saha Navigasyon</div>

<div id="map"></div>

    <circle cx="14" cy="14" r="2.5" fill="white"/>

<!-- Snap badge -->

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let map;
let gpsWatcher=null, gpsActive=false, gpsFollow=true;
let lastLat=null, lastLng=null, lastHeading=0;
let gpsMarker=null;
let fitMode=false;
let currentBase='sat';

// KMZ verisi
let kmlObjects=[]; // {name,type,pts,center,color}
let allVertices=[]; // [[lat,lng], ...]
let allSnapSegments=[]; // [[pt1,pt2], ...]
let projectBounds=null;

// Navigasyon
let navActive=false, navTarget=null, activeObj=null;

// Ölçüm
let measActive=false, measMode='line';
let measPts=[], measLineId=null, measPolyId=null;
let measDotIds=[];

// MapLibre source/layer isimleri
const SRC='kml-data';
const LAYERS=['kml-line','kml-poly-fill','kml-poly-stroke','kml-point'];

// ═══════════════════════════════════════════════════════
// HARITA
// ═══════════════════════════════════════════════════════
const BASE_STYLES={
  sat:{version:8,sources:{sat:{type:'raster',tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],tileSize:256,maxzoom:22}},layers:[{id:'sat',type:'raster',source:'sat'}]},
  osm:{version:8,sources:{osm:{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,maxzoom:19}},layers:[{id:'osm',type:'raster',source:'osm'}]},
  topo:{version:8,sources:{topo:{type:'raster',tiles:['https://tile.opentopomap.org/{z}/{x}/{y}.png'],tileSize:256,maxzoom:17}},layers:[{id:'topo',type:'raster',source:'topo'}]},
  dark:{version:8,sources:{dark:{type:'raster',tiles:['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'],tileSize:256,maxzoom:20}},layers:[{id:'dark',type:'raster',source:'dark'}]},
};

function initMap(){
  setProgress(10,'Harita başlatılıyor...');
  map=new maplibregl.Map({
    container:'map',
    style:BASE_STYLES.sat,
    center:[30.7,36.9],
    zoom:13,
    maxZoom:22,
    attributionControl:false,
    fadeDuration:150
  });

  map.on('load',()=>{
    setProgress(30,'ANTALYA.kmz yükleniyor...');
    loadKMZ();
    startCompass();
  });

  map.on('click',onMapClick);
  map.on('mousemove',onMouseMove);
  map.on('dragstart',()=>{
    if(gpsFollow){gpsFollow=false;updateBadge();}
  });
}

// ═══════════════════════════════════════════════════════
// KMZ / KML
// ═══════════════════════════════════════════════════════
function loadKMZ(){
  fetch('ANTALYA.kmz')
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.arrayBuffer();})
    .then(buf=>{setProgress(60,'Parse ediliyor...');return JSZip.loadAsync(buf);})
    .then(zip=>{
      const kmlFile=Object.keys(zip.files).find(n=>n.toLowerCase().endsWith('.kml'));
      if(!kmlFile)throw new Error('KML bulunamadı');
      return zip.files[kmlFile].async('string');
    })
    .then(text=>{setProgress(80,'Haritaya ekleniyor...');parseKML(text);})
    .catch(e=>{setProgress(0,'Hata: '+e.message);setTimeout(hideLoading,3000);});
}

function parseKML(text){
  const doc=new DOMParser().parseFromString(text,'text/xml');
  const features=[];
  const bounds=[];

  function coords(str){
    return str.trim().split(/\s+/).map(s=>{
      const p=s.split(',');
      return p.length>=2?[parseFloat(p[0]),parseFloat(p[1])]:null;
    }).filter(p=>p&&!isNaN(p[0])&&!isNaN(p[1]));
  }

  doc.querySelectorAll('Placemark').forEach(pm=>{
    const name=pm.querySelector('name')?.textContent?.trim()||'';
    const color=getColor(pm,doc)||'#00e5b4';

    // Point
    const ptEl=pm.querySelector('Point coordinates');
    if(ptEl){
      const cs=coords(ptEl.textContent);
      if(cs.length){
        const[lng,lat]=[cs[0][0],cs[0][1]];
        features.push({type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]},properties:{name,color,objType:'point'}});
        kmlObjects.push({name,type:'point',pts:[[lat,lng]],center:[lat,lng],color});
        allVertices.push([lat,lng]);
        bounds.push([lng,lat]);
      }
    }

    // LineString
    const lnEl=pm.querySelector('LineString coordinates');
    if(lnEl){
      const cs=coords(lnEl.textContent);
      if(cs.length>=2){
        features.push({type:'Feature',geometry:{type:'LineString',coordinates:cs},properties:{name,color,objType:'line'}});
        const pts=cs.map(c=>[c[1],c[0]]);
        const center=pts[Math.floor(pts.length/2)];
        kmlObjects.push({name,type:'line',pts,center,color});
        pts.forEach((p,i)=>{allVertices.push(p);bounds.push(cs[i]);if(i<pts.length-1)allSnapSegments.push([p,pts[i+1]]);});
      }
    }

    // Polygon
    const pgEl=pm.querySelector('outerBoundaryIs LinearRing coordinates')||pm.querySelector('Polygon coordinates');
    if(pgEl){
      const cs=coords(pgEl.textContent);
      if(cs.length>=3){
        features.push({type:'Feature',geometry:{type:'Polygon',coordinates:[cs]},properties:{name,color,objType:'poly'}});
        const pts=cs.map(c=>[c[1],c[0]]);
        const center=centroid(pts);
        kmlObjects.push({name,type:'poly',pts,center,color});
        pts.forEach((p,i)=>{allVertices.push(p);bounds.push(cs[i]);if(i<pts.length-1)allSnapSegments.push([p,pts[i+1]]);});
      }
    }
  });

  // GeoJSON kaynağı ekle
  const geojson={type:'FeatureCollection',features};
  map.addSource(SRC,{type:'geojson',data:geojson,tolerance:0.5});

  // Katmanlar
  map.addLayer({id:'kml-poly-fill',type:'fill',source:SRC,
    filter:['==',['get','objType'],'poly'],
    paint:{'fill-color':['get','color'],'fill-opacity':0.14}
  });
  map.addLayer({id:'kml-poly-stroke',type:'line',source:SRC,
    filter:['==',['get','objType'],'poly'],
    paint:{'line-color':['get','color'],'line-width':2.2}
  });
  map.addLayer({id:'kml-line',type:'line',source:SRC,
    filter:['==',['get','objType'],'line'],
    paint:{'line-color':['get','color'],'line-width':2.2}
  });
  map.addLayer({id:'kml-point',type:'circle',source:SRC,
    filter:['==',['get','objType'],'point'],
    paint:{'circle-radius':6,'circle-color':['get','color'],'circle-stroke-width':2,'circle-stroke-color':'#fff'}
  });

  // GeoJSON cache'e kaydet
  _geojsonCache={type:'FeatureCollection',features};

  // Tıklama handler'ları
  addClickHandlers();

  // Bounds
  if(bounds.length){
    const lngs=bounds.map(b=>b[0]),lats=bounds.map(b=>b[1]);
    projectBounds=[[Math.min(...lngs),Math.min(...lats)],[Math.max(...lngs),Math.max(...lats)]];
    map.fitBounds(projectBounds,{padding:40,maxZoom:19});
  }

  setProgress(100,`${features.length} obje yüklendi`);
  setTimeout(hideLoading,700);
  startGPS();
}

function getColor(pm,doc){
  try{
    const su=(pm.querySelector('styleUrl')?.textContent||'').replace(/^#/,'').trim();
    if(!su)return null;
    let style=doc.querySelector(`Style[id="${su}"] LineStyle color`)||
               doc.querySelector(`Style[id="${su}"] PolyStyle color`)||
               doc.querySelector(`Style[id="${su}"] IconStyle color`);
    if(!style){
      const pair=[...doc.querySelectorAll(`StyleMap[id="${su}"] Pair`)].find(p=>p.querySelector('key')?.textContent==='normal');
      if(pair){
        const url=(pair.querySelector('styleUrl')?.textContent||'').replace(/^#/,'');
        style=doc.querySelector(`Style[id="${url}"] LineStyle color`)||
               doc.querySelector(`Style[id="${url}"] PolyStyle color`)||
               doc.querySelector(`Style[id="${url}"] IconStyle color`);
      }
    }
    if(style){
      const h=style.textContent.trim().replace(/^#/,'');
      if(h.length===8){
        const r=h.substr(6,2),g=h.substr(4,2),b=h.substr(2,2);
        const lum=(parseInt(r,16)*299+parseInt(g,16)*587+parseInt(b,16)*114)/1000;
        return lum<20?null:'#'+r+g+b;
      }
      if(h.length===6)return'#'+h;
    }
  }catch{}
  return null;
}

// ═══════════════════════════════════════════════════════
// GPS
// ═══════════════════════════════════════════════════════
function startGPS(){
  if(!navigator.geolocation){showToast('GPS desteklenmiyor');return;}
  gpsWatcher=navigator.geolocation.watchPosition(onPos,onPosErr,{
    enableHighAccuracy:true,maximumAge:1000,timeout:15000
  });
}

function onPos(pos){
  const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
  lastLat=lat;lastLng=lng;
  gpsActive=true;

  // Marker
  if(!gpsMarker){
    const el=document.createElement('div');
    el.style.cssText='width:20px;height:20px;border-radius:50%;background:#00e5b4;border:3px solid white;box-shadow:0 0 0 6px rgba(0,229,180,0.2);';
    gpsMarker=new maplibregl.Marker({element:el,anchor:'center'})
      .setLngLat([lng,lat]).addTo(map);
  } else {
    gpsMarker.setLngLat([lng,lat]);
  }

  const badge=document.getElementById('gps-badge');
  badge.classList.add('active');
  document.getElementById('gps-txt').textContent='±'+Math.round(acc)+'m';
  document.getElementById('coord-txt').textContent=lat.toFixed(5)+', '+lng.toFixed(5);

  if(gpsFollow&&!fitMode)map.easeTo({center:[lng,lat],duration:400});
  if(navActive&&navTarget)updateNav(lat,lng);
}

function onPosErr(e){
  document.getElementById('gps-txt').textContent=e.code===1?'İzin Yok':'GPS Yok';
  document.getElementById('gps-badge').classList.remove('active');
}

function toggleFollow(){
  if(!gpsActive)return;
  gpsFollow=!gpsFollow;
  if(gpsFollow&&lastLat!=null){
    fitMode=false;
    map.flyTo({center:[lastLng,lastLat],zoom:Math.max(map.getZoom(),17),duration:600});
    document.getElementById('btn-fit').classList.remove('on');
  }
  updateBadge();
}

function updateBadge(){
  document.getElementById('gps-badge').style.borderColor=gpsFollow?'var(--accent2)':'';
}

// ═══════════════════════════════════════════════════════
// COMPASS
// ═══════════════════════════════════════════════════════
function startCompass(){
  if(typeof DeviceOrientationEvent?.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(s=>{if(s==='granted'){window.addEventListener('deviceorientation',onOrient);}})
      .catch(()=>{});
  } else {
    window.addEventListener('deviceorientation',onOrient);
  }
  document.getElementById('compass').style.display='flex';
}

function onOrient(e){
  const deg=e.webkitCompassHeading!=null?e.webkitCompassHeading:(360-(e.alpha||0));
  lastHeading=deg;
  document.getElementById('compass-svg').style.transform=`rotate(${deg}deg)`;
  if(navActive)updateNavArrow();
}

function resetNorth(){
  document.getElementById('compass-svg').style.transform='rotate(0deg)';
  lastHeading=0;
}

// ═══════════════════════════════════════════════════════
// SIĞDIR
// ═══════════════════════════════════════════════════════
function toggleFit(){
  fitMode=!fitMode;
  const btn=document.getElementById('btn-fit');
  if(fitMode){
    gpsFollow=false;
    btn.classList.add('on');
    if(projectBounds)map.fitBounds(projectBounds,{padding:40,maxZoom:19,duration:600});
    showToast('Proje görünümü');
  } else {
    btn.classList.remove('on');
    gpsFollow=true;
    if(lastLat!=null){
      map.flyTo({center:[lastLng,lastLat],zoom:17,duration:600});
      showToast('GPS konumuna dönüldü');
    }
  }
  updateBadge();
}

// ═══════════════════════════════════════════════════════
// ALLIK SEÇİCİ
// ═══════════════════════════════════════════════════════
// Stil değişince kaynak/katmanlar kaybolur — yeniden ekle
let _geojsonCache=null; // GeoJSON'u sakla

function buildGeoJSON(){
  const features=[];
  kmlObjects.forEach(o=>{
    if(o.type==='point')features.push({type:'Feature',geometry:{type:'Point',coordinates:[o.center[1],o.center[0]]},properties:{name:o.name,color:o.color,objType:'point'}});
    else if(o.type==='line')features.push({type:'Feature',geometry:{type:'LineString',coordinates:o.pts.map(p=>[p[1],p[0]])},properties:{name:o.name,color:o.color,objType:'line'}});
    else if(o.type==='poly')features.push({type:'Feature',geometry:{type:'Polygon',coordinates:[o.pts.map(p=>[p[1],p[0]])]},properties:{name:o.name,color:o.color,objType:'poly'}});
  });
  return{type:'FeatureCollection',features};
}

function addClickHandlers(){
  LAYERS.forEach(lid=>{
    map.on('click',lid,e=>{
      e.preventDefault?.();
      const f=e.features?.[0];if(!f)return;
      const obj=kmlObjects.find(o=>o.name===f.properties.name&&o.type===f.properties.objType);
      if(obj)showPopup(obj,e.lngLat);
    });
    map.on('mouseenter',lid,()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave',lid,()=>map.getCanvas().style.cursor='');
  });
}

function reAddKMLLayers(){
  if(!kmlObjects.length)return;
  try{
    if(map.getSource(SRC)){
      map.getSource(SRC).setData(_geojsonCache||buildGeoJSON());
      addClickHandlers();
      return;
    }
    if(!_geojsonCache)_geojsonCache=buildGeoJSON();
    map.addSource(SRC,{type:'geojson',data:_geojsonCache,tolerance:0.5});
    map.addLayer({id:'kml-poly-fill',type:'fill',source:SRC,filter:['==',['get','objType'],'poly'],paint:{'fill-color':['get','color'],'fill-opacity':0.14}});
    map.addLayer({id:'kml-poly-stroke',type:'line',source:SRC,filter:['==',['get','objType'],'poly'],paint:{'line-color':['get','color'],'line-width':2.2}});
    map.addLayer({id:'kml-line',type:'line',source:SRC,filter:['==',['get','objType'],'line'],paint:{'line-color':['get','color'],'line-width':2.2}});
    map.addLayer({id:'kml-point',type:'circle',source:SRC,filter:['==',['get','objType'],'point'],paint:{'circle-radius':6,'circle-color':['get','color'],'circle-stroke-width':2,'circle-stroke-color':'#fff'}});
    addClickHandlers();
  }catch(e){console.warn('reAddKMLLayers:',e);}
}

function setBase(type){
  currentBase=type;
  map.setStyle(BASE_STYLES[type]);
  map.once('idle',()=>reAddKMLLayers());
  document.querySelectorAll('.mt-card').forEach(el=>el.classList.remove('on'));
  document.getElementById('mc-'+type).classList.add('on');
  document.getElementById('mt-panel').classList.remove('show');
  document.getElementById('btn-mt').classList.remove('on');
}

function toggleMT(){
  const panel=document.getElementById('mt-panel');
  const btn=document.getElementById('btn-mt');
  const open=panel.classList.toggle('show');
  btn.classList.toggle('on',open);
}

// ═══════════════════════════════════════════════════════
// OBJE POPUP
// ═══════════════════════════════════════════════════════
function showPopup(obj,lngLat){
  activeObj=obj;
  document.getElementById('obj-name-txt').textContent=obj.name||'Obje';
  let info='';
  if(lastLat!=null){
    const d=dist(lastLat,lastLng,obj.center[0],obj.center[1]);
    info=fmtD(d)+' uzakta';
  }
  if(obj.type==='line'){const l=polyLen(obj.pts);info=(info?info+' · ':'')+fmtD(l);}
  if(obj.type==='poly'){const a=calcArea(obj.pts);info=(info?info+' · ':'')+fmtA(a);}
  document.getElementById('obj-info-txt').textContent=info||obj.type;
  document.getElementById('obj-popup').style.display='block';
}

function closePopup(){
  document.getElementById('obj-popup').style.display='none';
  activeObj=null;
}

// ═══════════════════════════════════════════════════════
// NAVİGASYON
// ═══════════════════════════════════════════════════════
function startNav(){
  if(!activeObj)return;
  navTarget=activeObj;
  navActive=true;
  closePopup();
  document.getElementById('nav-hud').style.display='flex';
  document.getElementById('btn-stopnav').style.display='flex';
  document.getElementById('btn-meas').style.display='none';
  fitMode=false;gpsFollow=true;
  document.getElementById('btn-fit').classList.remove('on');
  updateBadge();
  if(lastLat!=null)updateNav(lastLat,lastLng);
  showToast('→ '+navTarget.name);
}

function stopNav(){
  navActive=false;navTarget=null;
  document.getElementById('nav-hud').style.display='none';
  document.getElementById('btn-stopnav').style.display='none';
  document.getElementById('btn-meas').style.display='flex';
  showToast('Navigasyon durduruldu');
}

function updateNav(lat,lng){
  if(!navTarget)return;
  const d=dist(lat,lng,navTarget.center[0],navTarget.center[1]);
  document.getElementById('nav-dist').textContent=fmtD(d);
  document.getElementById('nav-name').textContent=navTarget.name||'Hedef';
  if(d<5){showToast('🎯 Hedefe ulaştınız!');stopNav();return;}
  updateNavArrow();
}

function updateNavArrow(){
  if(!navTarget||lastLat==null)return;
  const b=bearing(lastLat,lastLng,navTarget.center[0],navTarget.center[1]);
  const rel=(b-lastHeading+360)%360;
  const arr=['↑','↗','→','↘','↓','↙','←','↖'];
  document.getElementById('nav-arrow').textContent=arr[Math.round(rel/45)%8];
}

let _snapSourceAdded=false;

function toggleMeas(){
  measActive=!measActive;
  const btn=document.getElementById('btn-meas');
  btn.classList.toggle('on2',measActive);
  document.getElementById('meas-panel').style.display=measActive?'block':'none';
  document.getElementById('snap-badge').style.display=measActive?'block':'none';
  if(!measActive){clearMeas();document.getElementById('snap-badge').className='';}

}

function setMM(mode){
  measMode=mode;clearMeas();
  document.getElementById('mm-line').classList.toggle('on',mode==='line');
  document.getElementById('mm-area').classList.toggle('on',mode==='area');
}

function clearMeas(){
  measPts=[];
  measDotIds.forEach(id=>{try{map.removeLayer(id);map.removeSource(id);}catch{}});
  measDotIds=[];
  if(measLineId){try{map.removeLayer(measLineId);map.removeSource(measLineId);}catch{}}
  if(measPolyId){try{map.removeLayer(measPolyId);map.removeSource(measPolyId);}catch{}}
  measLineId=measPolyId=null;
  document.getElementById('meas-val').textContent='—';
  document.getElementById('meas-sub').textContent='';
}

function findSnap(lng,lat){
  if(!allVertices.length)return null;
  const pt=map.project([lng,lat]);
  let best=null,bestD=28; // px
  allVertices.forEach(v=>{
    const vp=map.project([v[1],v[0]]);
    const d=Math.hypot(pt.x-vp.x,pt.y-vp.y);
    if(d<bestD){bestD=d;best=v;}
  });
  allSnapSegments.forEach(seg=>{
    const mid=[(seg[0][0]+seg[1][0])/2,(seg[0][1]+seg[1][1])/2];
    const mp=map.project([mid[1],mid[0]]);
    const d=Math.hypot(pt.x-mp.x,pt.y-mp.y);
    if(d<bestD){bestD=d;best=mid;}
  });
  return best;
}

function onMouseMove(e){
  if(!measActive)return;
  const snap=findSnap(e.lngLat.lng,e.lngLat.lat);
  const badge=document.getElementById('snap-badge');
  badge.className=snap?'on':'off';
}

function onMapClick(e){
  if(navActive)return;
  // Altlık paneli kapat
  document.getElementById('mt-panel').classList.remove('show');
  document.getElementById('btn-mt').classList.remove('on');
  if(measActive){
    const snap=findSnap(e.lngLat.lng,e.lngLat.lat);
    const pt=snap?[snap[1],snap[0]]:[e.lngLat.lng,e.lngLat.lat];
    addMeasPt(pt);
    return;
  }
  closePopup();
}

function addMeasPt([lng,lat]){
  measPts.push([lng,lat]);
  // Nokta
  const did='md'+Date.now();
  map.addSource(did,{type:'geojson',data:{type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]}}});
  map.addLayer({id:did,type:'circle',source:did,paint:{'circle-radius':6,'circle-color':'#ffb830','circle-stroke-width':2,'circle-stroke-color':'#fff'}});
  measDotIds.push(did);

  if(measMode==='line'&&measPts.length>=2){
    if(measLineId){try{map.removeLayer(measLineId);map.removeSource(measLineId);}catch{}}
    measLineId='ml'+Date.now();
    map.addSource(measLineId,{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:measPts}}});
    map.addLayer({id:measLineId,type:'line',source:measLineId,paint:{'line-color':'#ffb830','line-width':2.5,'line-dasharray':[4,3]}});
    let d=0;for(let i=1;i<measPts.length;i++){const a=measPts[i-1],b=measPts[i];d+=haversine(a[1],a[0],b[1],b[0]);}
    document.getElementById('meas-val').textContent=fmtD(d);
  } else if(measMode==='area'&&measPts.length>=3){
    if(measPolyId){try{map.removeLayer(measPolyId+'-f');map.removeLayer(measPolyId+'-s');map.removeSource(measPolyId);}catch{}}
    measPolyId='mp'+Date.now();
    const ring=[...measPts,measPts[0]];
    map.addSource(measPolyId,{type:'geojson',data:{type:'Feature',geometry:{type:'Polygon',coordinates:[ring]}}});
    map.addLayer({id:measPolyId+'-f',type:'fill',source:measPolyId,paint:{'fill-color':'#ffb830','fill-opacity':0.15}});
    map.addLayer({id:measPolyId+'-s',type:'line',source:measPolyId,paint:{'line-color':'#ffb830','line-width':2.5}});
    const pts=measPts.map(p=>({lat:p[1],lng:p[0]}));
    const a=calcAreaLL(pts);
    document.getElementById('meas-val').textContent=fmtA(a);
    document.getElementById('meas-sub').textContent=(a/1000).toFixed(2)+' dönüm';
  }
}

// ═══════════════════════════════════════════════════════
// MATEMATİK
// ═══════════════════════════════════════════════════════
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function dist(lat1,lng1,lat2,lng2){return haversine(lat1,lng1,lat2,lng2);}

function bearing(lat1,lng1,lat2,lng2){
  const dL=(lng2-lng1)*Math.PI/180,f1=lat1*Math.PI/180,f2=lat2*Math.PI/180;
  return(Math.atan2(Math.sin(dL)*Math.cos(f2),Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dL))*180/Math.PI+360)%360;
}

function polyLen(pts){
  let d=0;for(let i=1;i<pts.length;i++)d+=haversine(pts[i-1][0],pts[i-1][1],pts[i][0],pts[i][1]);
  return d;
}

function calcArea(pts){
  // pts: [[lat,lng],...]
  return calcAreaLL(pts.map(p=>({lat:p[0],lng:p[1]})));
}

function calcAreaLL(pts){
  let a=0;const n=pts.length;
  for(let i=0;i<n;i++){
    const j=(i+1)%n;
    a+=pts[i].lng*pts[j].lat-pts[j].lng*pts[i].lat;
  }
  const refLat=pts[0].lat*Math.PI/180;
  return Math.abs(a/2)*(111320**2)*Math.cos(refLat);
}

function centroid(pts){
  return[pts.reduce((s,p)=>s+p[0],0)/pts.length,pts.reduce((s,p)=>s+p[1],0)/pts.length];
}

function fmtD(d){return d>=1000?(d/1000).toFixed(2)+' km':Math.round(d)+' m';}
function fmtA(a){return a>=10000?(a/10000).toFixed(3)+' ha':Math.round(a)+' m²';}

function setProgress(pct,msg){
  document.getElementById('splash-progress').style.width=pct+'%';
  document.getElementById('loading-status').textContent=msg;
}

function hideLoading(){
  const el=document.getElementById('loading');
  el.style.opacity='0';
  setTimeout(()=>el.style.display='none',500);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2500);
}
