<!-- TAM GÜNCELLENMİŞ DOSYA - SADECE BUNU KULLAN -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antalya Saha</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- GEOMETRİ İÇİN TURF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
<style>
body,html{margin:0;height:100%;}
#map{height:100%;}
</style>
</head>
<body>
<div id="map"></div>
<script>
let map;

function init(){
  map=L.map('map').setView([36.9,30.7],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  fetch('ANTALYA.kmz')
  .then(r=>r.arrayBuffer())
  .then(parseKMZ);
}

function parseKMZ(buf){
  JSZip.loadAsync(buf).then(zip=>{
    const kmlFile=Object.keys(zip.files).find(n=>n.endsWith('.kml'));
    return zip.files[kmlFile].async('string');
  }).then(parseKML);
}

function parseKML(text){
  const doc=new DOMParser().parseFromString(text,'text/xml');

  function getColor(pm){
    const colorNode=pm.querySelector('color');
    if(!colorNode) return '#3388ff';

    let c=colorNode.textContent.trim(); // aabbggrr
    if(c.length===8){
      const a=c.substring(0,2);
      const b=c.substring(2,4);
      const g=c.substring(4,6);
      const r=c.substring(6,8);
      return `#${r}${g}${b}`;
    }
    return '#3388ff';
  }

  function coords(str){
    return str.trim().split(/\s+/).map(s=>{
      const p=s.split(',');
      return [parseFloat(p[1]),parseFloat(p[0])];
    });
  }

  doc.querySelectorAll('Placemark').forEach(pm=>{
    const color=getColor(pm);

    const pt=pm.querySelector('Point coordinates');
    if(pt){
      const c=coords(pt.textContent)[0];
      L.circleMarker(c,{color,fillColor:color,fillOpacity:1}).addTo(map);
    }

    const ln=pm.querySelector('LineString coordinates');
    if(ln){
      const c=coords(ln.textContent);
      const line=L.polyline(c,{color}).addTo(map);

      const length=turf.length(turf.lineString(c.map(p=>[p[1],p[0]])),{units:'meters'});
      line.bindPopup('Uzunluk: '+length.toFixed(2)+' m');
    }

    const pg=pm.querySelector('Polygon coordinates');
    if(pg){
      const c=coords(pg.textContent);
      const poly=L.polygon(c,{color}).addTo(map);

      const area=turf.area(turf.polygon([[...c.map(p=>[p[1],p[0]])]]));
      poly.bindPopup('Alan: '+area.toFixed(2)+' m²');
    }
  });
}

init();
</script>
</body>
</html>
